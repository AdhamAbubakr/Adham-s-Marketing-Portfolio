<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Portal — Barkar.</title>
<link rel="icon" type="image/svg+xml" href="brand/favicon.svg" />
<meta name="robots" content="noindex,nofollow" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#7C3AED; --purple-light:#A855F7; --purple-deep:#5B21B6;
    --magenta:#EC4899; --cyan:#06B6D4; --green:#22D88F; --yellow:#EAB308;
    --bg:#0A0118; --bg2:#11062A; --bg3:#1A0F2E;
    --card:#1C1130; --card-hover:#241540;
    --border:rgba(168,85,247,0.18); --border-strong:rgba(168,85,247,0.4);
    --text:#F8F8FC; --muted:#9090A8;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
  ::-webkit-scrollbar{width:14px;height:14px}
  ::-webkit-scrollbar-track{background:var(--bg2);border-left:1px solid var(--border)}
  ::-webkit-scrollbar-thumb{
    background:linear-gradient(var(--purple),var(--purple-deep));
    border-radius:8px;border:3px solid var(--bg2);
    min-height:60px;
  }
  ::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(var(--purple-light),var(--purple));
    border-width:2px;
  }
  ::-webkit-scrollbar-thumb:active{background:var(--purple-light)}
  *{scrollbar-width:auto;scrollbar-color:var(--purple) var(--bg2)}

  /* Loading */
  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--muted)}
  [hidden]{display:none !important}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple-light);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Topbar */
  .topbar{
    position:sticky;top:0;z-index:50;background:rgba(10,1,24,0.85);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;
  }
  .topbar-brand{display:flex;align-items:center;gap:.7rem;text-decoration:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600}
  .topbar-mark{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0}
  .topbar-actions{display:flex;align-items:center;gap:1rem}
  .topbar-user{font-size:.85rem;color:var(--muted)}
  .btn-logout{background:transparent;border:1px solid var(--border-strong);color:var(--text);padding:.4rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif}
  .btn-logout:hover{background:var(--card-hover)}
  .topbar-back{color:var(--purple-light);text-decoration:none;font-size:.85rem;font-weight:500;padding:.4rem .9rem;border-radius:8px;transition:all .2s}
  .topbar-back:hover{background:var(--card-hover);color:var(--magenta)}
  @media (max-width:600px){.topbar-back{display:none}}

  .container{max-width:1300px;margin:0 auto;padding:2rem}
  .empty-state{
    text-align:center;padding:5rem 2rem;background:var(--card);border:1px solid var(--border);border-radius:18px;
    max-width:680px;margin:3rem auto;
  }
  .empty-icon{font-size:4rem;margin-bottom:1.2rem;opacity:.7}
  .empty-state h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin-bottom:.6rem}
  .empty-state p{color:var(--muted);margin-bottom:1.5rem}

  /* Welcome */
  .welcome{
    background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06));
    border:1px solid var(--border-strong);border-radius:18px;
    padding:2rem;margin-bottom:2rem;
    display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
  }
  .welcome-logo{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:1.8rem;flex-shrink:0;overflow:hidden}
  .welcome-logo img{width:100%;height:100%;object-fit:cover}
  .welcome-text{flex:1;min-width:220px}
  .welcome-hi{font-size:.85rem;color:var(--accent,var(--purple-light));font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.3rem}
  .welcome-name{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;line-height:1.1;margin-bottom:.3rem}
  .welcome-meta{color:var(--muted);font-size:.88rem}

  /* Service Selection */
  .services-pick{
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    padding:2rem;margin-bottom:2rem;
  }
  .services-pick h2{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-bottom:.4rem}
  .services-pick p{color:var(--muted);font-size:.9rem;margin-bottom:1.4rem}
  .service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;margin-bottom:1.5rem}
  .service-tile{
    background:var(--bg3);border:2px solid var(--border);border-radius:14px;
    padding:1.2rem;cursor:pointer;transition:all .25s;position:relative;
  }
  .service-tile:hover{border-color:var(--border-strong)}
  .service-tile.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06))}
  .service-tile.selected::after{content:'✓';position:absolute;top:.6rem;right:.7rem;background:var(--purple);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
  .service-tile-icon{font-size:1.6rem;margin-bottom:.6rem}
  .service-tile-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:.2rem}
  .service-tile-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
  .btn-save{
    background:var(--purple);color:#fff;border:none;padding:.85rem 1.6rem;
    border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    box-shadow:0 6px 18px rgba(124,58,237,.3);transition:all .2s;
  }
  .btn-save:hover{background:var(--purple-light);transform:translateY(-1px)}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.6rem}
  .stat-card{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:1.4rem 1.2rem;position:relative;overflow:hidden;
  }
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--magenta))}
  .stat-icon{position:absolute;top:1rem;right:1rem;font-size:1.2rem;opacity:.5}
  .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:.4rem}
  .stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:.3rem;background:linear-gradient(135deg,var(--text),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-sub{font-size:.75rem;color:var(--muted)}
  @media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

  /* Service Section */
  .svc-section{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:1.6rem;margin-bottom:1.4rem;
  }
  .svc-section-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.7rem;margin-bottom:1.2rem}
  .svc-section-head h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
  .svc-status-pill{padding:.2rem .6rem;border-radius:50px;font-size:.7rem;font-weight:600;background:rgba(168,85,247,.15);color:var(--purple-light);text-transform:uppercase;letter-spacing:.05em}

  /* Tables */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:.7rem 1rem;font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);background:var(--bg3)}
  td{padding:.85rem 1rem;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:top}
  .pf-pill{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--purple-light);font-size:.65rem;padding:.18rem .55rem;border-radius:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  .badge{display:inline-block;padding:.18rem .55rem;border-radius:50px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .badge.active{background:rgba(34,216,143,.15);color:var(--green)}
  .badge.paused{background:rgba(234,179,8,.15);color:var(--yellow)}
  .badge.ended{background:rgba(144,144,168,.15);color:var(--muted)}

  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .table-scroll{overflow-x:auto}

  .charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:1rem;margin-bottom:1.6rem}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
  .chart-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .chart-title small{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  canvas{max-width:100%;height:240px !important}
  @media (max-width:900px){.charts-grid{grid-template-columns:1fr}}

  .cta-box{
    background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(236,72,153,.04));
    border:1px solid var(--border-strong);border-radius:14px;
    padding:1.4rem;text-align:center;color:var(--muted);font-size:.9rem;
  }
  .cta-box a{color:var(--purple-light);text-decoration:none;font-weight:600}
  .cta-box a:hover{color:var(--magenta)}

  /* BRIEF FORM */
  .brief-progress{display:flex;gap:.4rem;margin:1rem 0 1.6rem}
  .brief-pip{flex:1;height:6px;background:var(--bg3);border-radius:3px;transition:background .3s}
  .brief-pip.done{background:linear-gradient(90deg,var(--purple),var(--magenta))}
  .brief-form{display:flex;flex-direction:column;gap:1rem}
  .brief-field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem;color:var(--text)}
  .brief-field input,.brief-field textarea,.brief-field select{
    width:100%;background:var(--bg);border:1px solid var(--border);
    color:var(--text);padding:.75rem .9rem;border-radius:10px;
    font-family:'Inter',sans-serif;font-size:.92rem;
  }
  .brief-field input:focus,.brief-field textarea:focus,.brief-field select:focus{
    outline:none;border-color:var(--purple-light);box-shadow:0 0 0 3px rgba(168,85,247,.12)
  }
  .brief-field textarea{resize:vertical;min-height:90px}
  .brief-field .checks{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.3rem}
  .brief-field .checks label{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);padding:.5rem .8rem;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.85rem;font-weight:500}
  .brief-field .checks input{width:auto;margin:0}
  .brief-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid var(--border)}
  .btn-secondary-soft{background:transparent;color:var(--muted);border:1px solid var(--border-strong);padding:.7rem 1.2rem;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500}
  .btn-secondary-soft:hover{color:var(--text);border-color:var(--purple)}

  /* SERVICE INQUIRY */
  .inquiry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.4rem}
  @media (max-width:780px){.inquiry-grid{grid-template-columns:1fr}}
  .inquiry-card{background:var(--bg3);border:2px solid var(--border);border-radius:14px;padding:1.6rem 1.2rem;cursor:pointer;text-align:center;transition:all .25s;text-decoration:none;color:var(--text);display:block}
  .inquiry-card:hover{border-color:var(--purple);background:var(--card-hover);transform:translateY(-3px)}
  .inquiry-icon{font-size:2.4rem;margin-bottom:.8rem}
  .inquiry-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;margin-bottom:.4rem}
  .inquiry-desc{font-size:.82rem;color:var(--muted);line-height:1.6}
  .service-detail-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:.9rem}
  .service-detail-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem}
  .service-detail-head h4{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;margin:0}
  .service-detail-list{padding-left:1.4rem;margin:0}
  .service-detail-list li{margin-bottom:.5rem;color:var(--muted);font-size:.9rem;line-height:1.7}

  /* CONTENT CARDS */
  .content-list{display:flex;flex-direction:column;gap:1rem}
  .content-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.4rem;transition:all .2s}
  .content-card:hover{border-color:var(--border-strong)}
  .content-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.8rem;flex-wrap:wrap}
  .content-card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1.05rem;margin-bottom:.3rem}
  .content-card-meta{display:flex;gap:.6rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted);align-items:center}
  .content-caption{color:var(--text);font-size:.92rem;line-height:1.7;margin-bottom:.7rem;padding:.7rem 1rem;background:var(--bg);border-radius:10px;border-left:3px solid var(--purple)}
  .content-hashtags{font-size:.85rem;color:var(--cyan);margin-bottom:.7rem}
  .content-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.7rem;margin-bottom:.8rem}
  .content-file{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.5rem;text-align:center;text-decoration:none;color:var(--text);transition:border-color .2s}
  .content-file:hover{border-color:var(--purple)}
  .content-file img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;margin-bottom:.4rem}
  .content-file .file-icon{font-size:2rem;margin:.7rem 0}
  .content-file .file-name{font-size:.7rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .content-actions{display:flex;justify-content:flex-end;gap:.7rem;flex-wrap:wrap;padding-top:.7rem;border-top:1px solid var(--border);margin-top:.7rem}

  /* CONTRACT CARDS */
  .contract-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1rem}
  .contract-head{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .contract-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1.1rem;margin-bottom:.3rem}
  .contract-meta{font-size:.85rem;color:var(--muted)}
  .contract-content{color:var(--text);font-size:.92rem;line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto;padding:.5rem 0}

  .pf-pill{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--purple-light);font-size:.65rem;padding:.18rem .55rem;border-radius:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}

  /* STRATEGY VIEW */
  .strategy-sections{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.4rem}
  .strategy-block{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .strategy-block summary{padding:1rem 1.2rem;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;list-style:none;display:flex;justify-content:space-between;align-items:center}
  .strategy-block summary::after{content:'+';font-size:1.4rem;color:var(--muted);font-weight:300}
  .strategy-block[open] summary::after{content:'−'}
  .strategy-block summary:hover{background:var(--card-hover)}
  .strategy-block-body{padding:0 1.2rem 1.2rem;color:var(--muted);line-height:1.7;font-size:.92rem}
  .strategy-actions{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;justify-content:flex-end}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div>Loading your portal&hellip;</div>
</div>

<div id="app" hidden>
  <!-- TOPBAR -->
  <div class="topbar">
    <a href="#" class="topbar-brand">
      <span class="topbar-mark">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="url(#tg)"/><path fill-rule="evenodd" d="M22 16h22c10 0 17 6 17 14 0 5-3 9-7 11 5 2 9 7 9 13 0 8-7 14-17 14H22V16zm10 8v10h12c4 0 6-2 6-5s-2-5-6-5H32zm0 18v12h14c4 0 7-2 7-6s-3-6-7-6H32z" fill="#FFF"/><circle cx="62" cy="20" r="4" fill="#EC4899"/></svg>
      </span>
      Barkar<span style="color:var(--magenta)">.</span>&nbsp;Client&nbsp;Portal
    </a>
    <div class="topbar-actions">
      <a href="/" class="topbar-back">← Back to Site</a>
      <span class="topbar-user" id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <div class="container" id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const loading = document.getElementById('loading');
const app = document.getElementById('app');
const content = document.getElementById('content');

// Service catalog (must match the service keys saved in clients.services)
const SERVICES = [
  {key:'media_buying', icon:'🎯', name:'Paid Media / Media Buying', desc:'Meta · Google · TikTok ads'},
  {key:'social_media', icon:'📱', name:'Social Media Management', desc:'Content · community · growth'},
  {key:'website_design', icon:'🛒', name:'Website / E-commerce', desc:'Shopify · WordPress · landing pages'},
  {key:'content_creative', icon:'🎨', name:'Content & Creative', desc:'Graphics · video · copy'},
  {key:'crm_automation', icon:'🤖', name:'CRM & Automation', desc:'Zoho · N8N · workflows'},
  {key:'analytics', icon:'📊', name:'Analytics & Reporting', desc:'GA4 · dashboards · insights'},
];

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/signup.html';
});

// 10-second safety net
const safetyTimer = setTimeout(() => {
  if(!loading.hidden){
    console.error('[Client Portal] Timeout — init took >10s');
    loading.hidden = true;
    app.hidden = false;
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⏱️</div><h2>Took too long to load</h2><p>The portal is taking longer than expected. Try reloading or signing out.</p><button onclick="location.reload()" class="btn-save">Reload</button> <button onclick="supabase.auth.signOut().then(()=>location.href='/signup.html')" class="btn-secondary-soft">Sign out</button></div>`;
  }
}, 10000);

(async function init(){
  try {
    console.log('[Client Portal] Init start at', new Date().toISOString());
    const { data:{ session } } = await supabase.auth.getSession();
    if(!session){ location.href = '/signup.html'; return; }

    document.getElementById('userEmail').textContent = session.user.email;
    console.log('[Client Portal] User:', session.user.email);

    // Role-based redirect (use maybeSingle)
    const { data: roleRow, error: roleErr } = await supabase.from('user_roles').select('role').eq('user_id', session.user.id).maybeSingle();
    if(roleErr) console.warn('[Client Portal] Role query error:', roleErr);
    console.log('[Client Portal] Role:', roleRow?.role || 'none');

    if(roleRow?.role === 'admin'){ location.href = '/admin.html'; return; }
    if(roleRow?.role === 'team'){ location.href = '/team.html'; return; }

    // Find linked client record
    const { data: client, error } = await supabase.from('clients').select('*').eq('auth_user_id', session.user.id).maybeSingle();

    loading.hidden = true;
    app.hidden = false;

    if(error || !client){
      console.warn('[Client Portal] No linked client:', error);
      clearTimeout(safetyTimer);
      renderEmpty(session.user.email);
      return;
    }

    clearTimeout(safetyTimer);
    renderPortal(client, session.user);
  } catch(err){
    clearTimeout(safetyTimer);
    console.error('[Client Portal] Fatal:', err);
    loading.hidden = true;
    app.hidden = false;
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h2>Something went wrong</h2><p>${(err && err.message) || 'Unknown error'}. Open Console (F12) for details.</p><button onclick="location.reload()" class="btn-save">Reload</button> <button onclick="supabase.auth.signOut().then(()=>location.href='/signup.html')" class="btn-secondary-soft">Sign out</button></div>`;
  }
})();

async function renderBriefForm(client){
  // Check existing brief
  const { data: existing } = await supabase.from('client_briefs')
    .select('*').eq('client_id', client.id).order('created_at',{ascending:false}).limit(1);
  if(existing && existing.length){
    briefState = { step: existing[0].current_step || 1, answers: existing[0].answers || {}, briefId: existing[0].id };
  }
  drawBriefStep(client);
}

function drawBriefStep(client){
  const stepIdx = briefState.step - 1;
  const step = BRIEF_STEPS[stepIdx];
  const total = BRIEF_STEPS.length;
  content.innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">${client.logo_url ? `<img src="${esc(client.logo_url)}" alt=""/>` : esc(client.name.charAt(0))}</div>
      <div class="welcome-text">
        <div class="welcome-hi">Onboarding · ${briefState.step}/${total}</div>
        <div class="welcome-name">Tell us about your business</div>
        <div class="welcome-meta">The more we know, the better the strategy we build for you.</div>
      </div>
    </div>

    <div class="services-pick">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.4rem">
        <div style="font-size:2rem">${step.icon}</div>
        <h2 style="margin:0">${step.title}</h2>
      </div>
      <div class="brief-progress">
        ${BRIEF_STEPS.map((_,i) => `<div class="brief-pip ${i+1<=briefState.step?'done':''}"></div>`).join('')}
      </div>
      <form id="briefForm" class="brief-form">
        ${step.fields.map(f => renderField(f)).join('')}
        <div class="brief-actions">
          ${briefState.step > 1 ? `<button type="button" class="btn-secondary-soft" id="briefBackBtn">← Back</button>` : '<span></span>'}
          ${briefState.step < total
            ? `<button type="submit" class="btn-save">Save &amp; Continue →</button>`
            : `<button type="submit" class="btn-save">🚀 Submit Brief</button>`}
        </div>
      </form>
    </div>
  `;

  document.getElementById('briefBackBtn')?.addEventListener('click', () => {
    briefState.step--;
    drawBriefStep(client);
  });

  document.getElementById('briefForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    // Capture answers from this step
    step.fields.forEach(f => {
      const els = document.querySelectorAll(`[name="${f.key}"]`);
      if(f.type === 'checkbox'){
        briefState.answers[f.key] = Array.from(els).filter(el => el.checked).map(el => el.value);
      } else if(els.length){
        briefState.answers[f.key] = els[0].value.trim();
      }
    });

    // Save to DB
    const isLast = briefState.step === total;
    const payload = {
      client_id: client.id,
      answers: briefState.answers,
      current_step: isLast ? total : briefState.step + 1,
      total_steps: total,
      status: isLast ? 'submitted' : 'draft',
      submitted_at: isLast ? new Date().toISOString() : null,
      updated_at: new Date().toISOString()
    };

    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    const oldText = submitBtn.textContent;
    submitBtn.textContent = 'Saving…';

    let resp;
    if(briefState.briefId){
      resp = await supabase.from('client_briefs').update(payload).eq('id', briefState.briefId);
    } else {
      resp = await supabase.from('client_briefs').insert([payload]).select().single();
      if(resp.data) briefState.briefId = resp.data.id;
    }

    if(resp.error){ alert('Error: ' + resp.error.message); submitBtn.disabled=false; submitBtn.textContent=oldText; return; }

    if(isLast){
      // Notify admin via Web3Forms
      if(window.WEB3FORMS_KEY){
        try {
          await fetch('https://api.web3forms.com/submit', {
            method:'POST',
            headers:{'Content-Type':'application/json','Accept':'application/json'},
            body: JSON.stringify({
              access_key: window.WEB3FORMS_KEY,
              subject: `📝 New Brief Submitted: ${client.name}`,
              from_name: 'Barkar Portal',
              brand: client.name,
              email: client.contact_email,
              message: `Client ${client.name} (${client.contact_email}) just submitted their brief. View in admin: https://barkar.net/admin.html`
            })
          });
        } catch(e){ console.warn('Email notify failed', e); }
      }
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎉</div>
          <h2>Brief submitted — thank you!</h2>
          <p>The Barkar team will review your answers and get back to you within 48 hours with a marketing strategy. You'll see it right here in your portal.</p>
          <button class="btn-save" onclick="location.reload()">Go to my dashboard →</button>
        </div>
      `;
    } else {
      briefState.step++;
      drawBriefStep(client);
    }
  });
}

function renderField(f){
  const v = briefState.answers[f.key] || '';
  const req = f.required ? 'required' : '';
  if(f.type === 'textarea'){
    return `<div class="brief-field"><label>${esc(f.label)}${f.required?' *':''}</label><textarea name="${f.key}" rows="3" ${req} placeholder="${esc(f.placeholder||'')}">${esc(v)}</textarea></div>`;
  }
  if(f.type === 'select'){
    return `<div class="brief-field"><label>${esc(f.label)}${f.required?' *':''}</label><select name="${f.key}" ${req}>
      <option value="">Choose…</option>
      ${f.options.map(o => `<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('')}
    </select></div>`;
  }
  if(f.type === 'checkbox'){
    const arr = Array.isArray(v) ? v : [];
    return `<div class="brief-field"><label>${esc(f.label)}${f.required?' *':''}</label><div class="checks">
      ${f.options.map(o => `<label><input type="checkbox" name="${f.key}" value="${esc(o)}" ${arr.includes(o)?'checked':''}/> ${esc(o)}</label>`).join('')}
    </div></div>`;
  }
  return `<div class="brief-field"><label>${esc(f.label)}${f.required?' *':''}</label><input type="${f.type||'text'}" name="${f.key}" value="${esc(v)}" placeholder="${esc(f.placeholder||'')}" ${req}/></div>`;
}

      <div class="svc-section">
        <div class="svc-section-head"><h3>📊 Analytics &amp; Reporting</h3></div>
        <div class="cta-box">Detailed monthly reports + custom dashboards will appear here. Ask the Barkar team for your latest report.</div>
      </div>
    `;
  }

  // === CONTENT AWAITING APPROVAL ===
  const { data: pendingContent } = await supabase
    .from('content_items')
    .select('*, files:content_files(*), comments:content_comments(*)')
    .eq('client_id', client.id)
    .in('status', ['review','approved','scheduled','published'])
    .order('scheduled_date', {ascending:true, nullsLast:true})
    .order('created_at', {ascending:false});

  const inReview = (pendingContent || []).filter(c => c.status === 'review');
  if((pendingContent || []).length){
    html += `
      <div class="svc-section">
        <div class="svc-section-head">
          <h3>📅 Your Content</h3>
          ${inReview.length ? `<span class="svc-status-pill" style="background:rgba(234,179,8,.15);color:var(--yellow)">${inReview.length} need your approval</span>` : ''}
        </div>
        <div class="content-list">
          ${(pendingContent || []).map(c => {
            const sb = {review:'#EAB308', approved:'var(--purple-light)', scheduled:'var(--cyan)', published:'var(--green)'}[c.status];
            return `
              <div class="content-card" data-id="${c.id}">
                <div class="content-card-head">
                  <div>
                    <div class="content-card-title">${esc(c.title)}</div>
                    <div class="content-card-meta">
                      <span class="pf-pill">${esc(c.platform)}</span>
                      <span>${esc(c.content_type)}</span>
                      ${c.scheduled_date ? `<span>📅 ${c.scheduled_date}</span>` : ''}
                    </div>
                  </div>
                  <span class="badge" style="background:rgba(168,85,247,0.18);color:${sb}">${c.status}</span>
                </div>
                ${c.caption ? `<div class="content-caption">${esc(c.caption).replace(/\n/g,'<br/>')}</div>` : ''}
                ${c.hashtags ? `<div class="content-hashtags">${esc(c.hashtags)}</div>` : ''}
                ${(c.files || []).length ? `
                  <div class="content-files">
                    ${c.files.map(f => `
                      <a href="${esc(f.file_url)}" target="_blank" class="content-file">
                        ${f.file_type && f.file_type.startsWith('image') ? `<img src="${esc(f.file_url)}" alt=""/>` : `<div class="file-icon">📎</div>`}
                        <div class="file-name">${esc(f.file_name || 'File')}</div>
                      </a>
                    `).join('')}
                  </div>
                ` : ''}
                ${c.status === 'review' ? `
                  <div class="content-actions">
                    <button class="btn-secondary-soft" onclick="rejectContent('${c.id}')">✗ Request Changes</button>
                    <button class="btn-save" onclick="approveContent('${c.id}')">✓ Approve</button>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // === CONTRACTS (full workflow) ===
  const { data: contracts } = await supabase.from('contracts').select('*').eq('client_id', client.id).neq('status','cancelled').order('created_at',{ascending:false});
  if(contracts && contracts.length){
    html += `
      <div class="svc-section">
        <div class="svc-section-head">
          <h3>📄 Your Contracts</h3>
        </div>
        ${contracts.map(c => {
          const isSent = c.status === 'sent';
          const isClientSigned = c.status === 'client_signed';
          const isVerified = ['verified','team_assigned','active'].includes(c.status);
          const statusLabel = {
            draft:'Draft',
            sent:'Awaiting your signature',
            client_signed:'Awaiting Barkar verification',
            verified:'Verified · Pick your team',
            team_assigned:'Team assigned',
            active:'Active'
          }[c.status] || c.status;
          const statusColor = isVerified ? 'var(--green)' : (isClientSigned ? 'var(--yellow)' : 'var(--purple-light)');
          return `
          <div class="contract-card">
            <div class="contract-head">
              <div>
                <div class="contract-title">${esc(c.title)}</div>
                <div class="contract-meta">
                  ${esc(c.contract_number || '')} · ${esc(c.type)} · ${c.total_value ? c.currency+' '+Number(c.total_value).toLocaleString() : 'Custom'} ·
                  <span style="color:${statusColor};font-weight:600">${statusLabel}</span>
                </div>
              </div>
            </div>

            ${(c.services && c.services.length) ? `
              <div style="margin-top:.8rem">
                <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">Services included</div>
                <div style="display:flex;flex-wrap:wrap;gap:.4rem">
                  ${c.services.map(s => `<span style="font-size:.75rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:var(--purple-light);padding:.25rem .6rem;border-radius:50px">${esc(s.label)}</span>`).join('')}
                </div>
              </div>` : ''}

            <div style="margin-top:1rem;padding:1rem;background:var(--card);border:1px solid var(--border);border-radius:10px">
              ${c.pdf_url ? `
                <div style="display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:.8rem">
                  <a href="${c.pdf_url}" target="_blank" rel="noopener" class="btn-save" style="text-decoration:none">⬇ Download Contract PDF</a>
                  ${isSent ? '<span style="font-size:.78rem;color:var(--muted)">→ Print, sign by hand, scan it back, then upload below</span>' : ''}
                </div>` : '<div style="color:var(--muted);font-size:.85rem;margin-bottom:.6rem">⏳ PDF being prepared by Barkar.</div>'}

              ${(isSent || isClientSigned) ? `
                <div style="border-top:1px dashed var(--border);padding-top:.8rem;margin-top:.4rem">
                  <div style="font-size:.85rem;color:var(--text);margin-bottom:.5rem;font-weight:600">Upload signed copy</div>
                  <div style="font-size:.78rem;color:var(--muted);margin-bottom:.6rem">Make sure you ticked the services, signed, wrote your full name, national ID, and the hand-written declaration.</div>
                  <input type="file" id="signedFile_${c.id}" accept="application/pdf,image/*" style="font-size:.85rem;color:var(--muted)" />
                  <button class="btn-save" style="margin-top:.5rem" onclick="uploadSignedContract('${c.id}')">📤 Upload Signed Copy</button>
                  ${c.signed_pdf_url ? `<div style="margin-top:.6rem;font-size:.78rem;color:var(--green)">✓ Already uploaded — <a href="${c.signed_pdf_url}" target="_blank" rel="noopener" style="color:var(--purple-light)">view</a>. Re-upload to replace.</div>` : ''}
                </div>` : ''}

              ${isClientSigned ? `<div style="margin-top:.8rem;padding:.7rem;background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);border-radius:8px;font-size:.82rem;color:var(--yellow)">⏳ Barkar is reviewing your signed copy. You'll get email confirmation once verified, then you can pick your team here.</div>`:''}

              ${isVerified ? `<div style="margin-top:.8rem;padding:.7rem;background:rgba(34,216,143,.1);border:1px solid rgba(34,216,143,.3);border-radius:8px;font-size:.82rem;color:var(--green)">✓ Contract verified. Your portal is now unlocked. Scroll down to pick your team and start your project.</div>`:''}
            </div>
          </div>
        `;}).join('')}
      </div>
    `;
  }

  // === TEAM PICKER (visible only if any verified contract) ===
  const verifiedCtr = (contracts || []).find(c => c.is_unlocked);
  if(verifiedCtr){
    const { data: teamPool } = await supabase.from('team_members').select('id,full_name,role_title,country,avatar_url,skills').eq('status','active').order('full_name');
    const picked = verifiedCtr.team_member_ids || [];
    html += `
      <div class="svc-section">
        <div class="svc-section-head">
          <h3>👥 Pick Your Team</h3>
          <span class="svc-status-pill" style="background:rgba(34,216,143,.15);color:var(--green)">${picked.length} selected</span>
        </div>
        <div style="font-size:.88rem;color:var(--muted);margin-bottom:1rem">Choose the specialists you want on your account. Once submitted, Barkar will confirm and unlock the execution dashboard.</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem">
          ${(teamPool || []).map(m => {
            const isPicked = picked.includes(m.id);
            return `
              <label style="display:flex;flex-direction:column;gap:.4rem;padding:1rem;background:var(--card);border:1px solid ${isPicked?'var(--purple-light)':'var(--border)'};border-radius:12px;cursor:pointer;transition:all .2s">
                <div style="display:flex;align-items:center;gap:.6rem">
                  <input type="checkbox" class="team-pick" data-id="${m.id}" ${isPicked?'checked':''} ${verifiedCtr.execution_unlocked?'disabled':''}/>
                  <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--magenta));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">${esc((m.full_name||'?').charAt(0))}</div>
                  <div>
                    <div style="font-weight:600;font-size:.92rem;color:var(--text)">${esc(m.full_name||'')}</div>
                    <div style="font-size:.74rem;color:var(--muted)">${esc(m.role_title||'')}${m.country?' · '+esc(m.country):''}</div>
                  </div>
                </div>
                ${(m.skills||[]).length ? `<div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.3rem">${(m.skills||[]).slice(0,3).map(s => `<span style="font-size:.65rem;color:var(--muted);background:var(--bg2);padding:.15rem .45rem;border-radius:50px">${esc(s)}</span>`).join('')}</div>`:''}
              </label>
            `;
          }).join('')}
        </div>
        ${verifiedCtr.execution_unlocked ? `
          <div style="margin-top:1rem;padding:.9rem;background:rgba(34,216,143,.1);border:1px solid rgba(34,216,143,.3);border-radius:10px;color:var(--green);font-size:.88rem">🚀 Execution unlocked. Your team is locked in and the project is active.</div>
        ` : `
          <button class="btn-save" style="margin-top:1rem" onclick="submitTeamPick('${verifiedCtr.id}')">✓ Submit Team Selection</button>
        `}
      </div>
    `;
  }

  // === MARKETING STRATEGY (if delivered) ===
  const strategy = (strategies && strategies[0]) || null;
  if(strategy){
    const sections = strategy.content || {};
    const sectionList = [
      ['executive_summary','📌 Executive Summary'],
      ['target_audience','🎯 Target Audience'],
      ['positioning','💎 Positioning'],
      ['channels','📡 Channels'],
      ['content_pillars','📚 Content Pillars'],
      ['ads_plan','🎬 Ads Plan'],
      ['kpis','📊 KPIs &amp; Goals'],
      ['timeline','📅 Timeline'],
    ];
    html += `
      <div class="svc-section">
        <div class="svc-section-head">
          <h3>🧠 Your Marketing Strategy</h3>
          <span class="svc-status-pill" style="background:rgba(34,216,143,.15);color:var(--green)">v${strategy.version} · ${strategy.status}</span>
        </div>
        <h4 style="font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-bottom:1rem;color:var(--text)">${esc(strategy.title)}</h4>
        <div class="strategy-sections">
          ${sectionList.filter(([k,_]) => sections[k]).map(([k,label]) => `
            <details class="strategy-block" ${k==='executive_summary'?'open':''}>
              <summary>${label}</summary>
              <div class="strategy-block-body">${esc(sections[k]).replace(/\n/g,'<br/>')}</div>
            </details>
          `).join('')}
        </div>
        <div class="strategy-actions">
          ${strategy.is_paid_unlocked
            ? `<button class="btn-save" onclick="exportStrategyPDF()" style="display:inline-flex;align-items:center;gap:.4rem">⬇ Export to PDF</button>`
            : `<div class="cta-box" style="margin-top:0">📄 PDF export unlocks once payment is confirmed. Talk to the Barkar team to proceed.</div>`}
          ${strategy.status === 'sent' ? `<button class="btn-secondary-soft" id="approveStrategyBtn" data-id="${strategy.id}">✅ Approve Strategy</button>` : ''}
        </div>
      </div>
    `;
  }

  // CTA to update services
  html += `<div class="cta-box" style="margin-top:1.5rem">Need to add or change a service? <a href="#" id="changeServicesLink">Update your services →</a></div>`;

  content.innerHTML = html;

  // Render charts
  setTimeout(() => renderCharts(metrics || []), 50);

  // Wire change services
  document.getElementById('changeServicesLink')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await supabase.from('clients').update({services:[]}).eq('id', client.id);
    location.reload();
  });

  // Export strategy as PDF (browser print)
  window.exportStrategyPDF = () => {
    // Hide everything except the strategy section, then print
    const stylesId = 'pdf-print-style';
    if(!document.getElementById(stylesId)){
      const s = document.createElement('style');
      s.id = stylesId;
      s.innerHTML = `
        @media print {
          body * { visibility: hidden; }
          .svc-section, .svc-section *, .strategy-block, .strategy-block * { visibility: visible; }
          .svc-section { position: absolute; left: 0; top: 0; width: 100%; padding: 2rem; background: white !important; color: black !important; border: none !important; }
          .svc-section h3, .svc-section h4 { color: #1a0f2e !important; }
          .svc-section, .strategy-block { background: white !important; border-color: #ddd !important; }
          .strategy-block-body { color: #333 !important; }
          .strategy-actions, .cta-box, button { display: none !important; }
        }
      `;
      document.head.appendChild(s);
    }
    setTimeout(() => window.print(), 100);
  };

  // Approve / Reject content
  window.approveContent = async (id) => {
    if(!confirm('Approve this content for scheduling?')) return;
    await supabase.from('content_items').update({ status:'approved', updated_at:new Date().toISOString() }).eq('id', id);
    location.reload();
  };
  window.rejectContent = async (id) => {
    const feedback = prompt('What needs to change? (Optional feedback)');
    if(feedback === null) return;
    await supabase.from('content_items').update({ status:'rejected', client_feedback: feedback, updated_at:new Date().toISOString() }).eq('id', id);
    location.reload();
  };

  // Sign contract
  // === Upload signed contract PDF/image ===
  window.uploadSignedContract = async (id) => {
    const fileInput = document.getElementById('signedFile_'+id);
    const file = fileInput?.files?.[0];
    if(!file){ alert('Please choose a file first (the signed PDF or a clear photo of the signed copy).'); return; }
    if(file.size > 12 * 1024 * 1024){ alert('File too large. Please keep it under 12MB.'); return; }

    const session = await supabase.auth.getSession();
    const uid = session.data.session?.user?.id;
    if(!uid){ alert('Session expired. Please refresh.'); return; }

    const ext = (file.name.split('.').pop() || 'pdf').toLowerCase();
    const path = `${uid}/signed-${id}-${Date.now()}.${ext}`;

    const { error: upErr } = await supabase.storage.from('contracts').upload(path, file, { contentType: file.type, upsert: false });
    if(upErr){ alert('Upload failed: '+upErr.message+'\n\n(Make sure the contract-workflow.sql has been run.)'); return; }
    const { data: pub } = supabase.storage.from('contracts').getPublicUrl(path);

    const { error: updErr } = await supabase.from('contracts').update({
      signed_pdf_url: pub.publicUrl,
      status: 'client_signed',
      signed_by_client_at: new Date().toISOString()
    }).eq('id', id);
    if(updErr){ alert('Update failed: '+updErr.message); return; }

    alert('✅ Signed copy uploaded!\n\nBarkar will review it and unlock your team picker shortly.');
    location.reload();
  };

  // === Submit team selection ===
  window.submitTeamPick = async (contractId) => {
    const checked = Array.from(document.querySelectorAll('.team-pick:checked')).map(c => c.dataset.id);
    if(!checked.length){ alert('Please select at least one team member.'); return; }
    if(!confirm(`Confirm team selection (${checked.length} member${checked.length>1?'s':''})?`)) return;
    const { error } = await supabase.from('contracts').update({
      team_member_ids: checked,
      status: 'team_assigned'
    }).eq('id', contractId);
    if(error){ alert('Error: '+error.message); return; }
    alert('✓ Team selection submitted. Barkar will confirm and unlock execution shortly.');
    location.reload();
  };

  // Approve strategy
  document.getElementById('approveStrategyBtn')?.addEventListener('click', async (e) => {
    const id = e.target.dataset.id;
    if(!confirm('Approve this strategy as final?')) return;
    e.target.disabled = true; e.target.textContent = 'Approving…';
    await supabase.from('marketing_strategies').update({
      status:'approved', approved_at: new Date().toISOString()
    }).eq('id', id);
    location.reload();
  });
}

function wireServiceSelection(clientId){
  document.querySelectorAll('.service-tile').forEach(t => t.addEventListener('click', () => t.classList.toggle('selected')));
  document.getElementById('saveServicesBtn').addEventListener('click', async (e) => {
    const selected = Array.from(document.querySelectorAll('.service-tile.selected')).map(t => t.dataset.key);
    if(!selected.length){ alert('Please pick at least one service.'); return; }
    e.target.disabled = true; e.target.textContent = 'Saving…';
    const { error } = await supabase.from('clients').update({services: selected}).eq('id', clientId);
    if(error){ alert('Error: '+error.message); e.target.disabled=false; e.target.textContent='Save & Open My Dashboard'; return; }
    location.reload();
  });
}

let chSpend, chPlatform;
function renderCharts(metrics){
  // Spend over time
  const byDate = {};
  metrics.forEach(m => { byDate[m.date] = (byDate[m.date]||0) + Number(m.spend||0); });
  const dates = Object.keys(byDate).sort();
  const spends = dates.map(d => byDate[d]);
  const c1 = document.getElementById('chSpend');
  if(c1){
    if(chSpend) chSpend.destroy();
    const ctx = c1.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,240);
    grad.addColorStop(0,'rgba(168,85,247,0.4)'); grad.addColorStop(1,'rgba(168,85,247,0)');
    chSpend = new Chart(ctx,{
      type:'line',
      data:{labels:dates,datasets:[{label:'Spend',data:spends,borderColor:'#A855F7',backgroundColor:grad,borderWidth:2,tension:0.35,fill:true,pointRadius:3,pointBackgroundColor:'#EC4899'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#5e5e75',font:{size:10}}},y:{grid:{color:'rgba(168,85,247,0.08)'},ticks:{color:'#5e5e75',font:{size:10}}}}}
    });
  }

  // Platform breakdown
  const byPlat = {};
  metrics.forEach(m => { const p = m.platform || 'all'; byPlat[p] = (byPlat[p]||0) + Number(m.spend||0); });
  const c2 = document.getElementById('chPlatform');
  if(c2){
    if(chPlatform) chPlatform.destroy();
    chPlatform = new Chart(c2.getContext('2d'),{
      type:'doughnut',
      data:{labels:Object.keys(byPlat),datasets:[{data:Object.values(byPlat),backgroundColor:['#7C3AED','#A855F7','#EC4899','#06B6D4','#F472B6','#FEF3C7','#22D88F','#EAB308'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9090A8',font:{size:11},padding:12,boxWidth:10}}},cutout:'60%'}
    });
  }
}

function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function big(n){ n=Number(n||0); if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }
</script>
