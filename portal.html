<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Portal — Adham. Marketing</title>
<link rel="icon" type="image/svg+xml" href="brand/favicon.svg" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#7C3AED; --purple-light:#A855F7; --purple-deep:#5B21B6;
    --magenta:#EC4899; --cyan:#06B6D4; --green:#22D88F; --yellow:#EAB308;
    --bg:#0A0118; --bg2:#11062A; --bg3:#1A0F2E;
    --card:#1C1130; --card-hover:#241540;
    --border:rgba(168,85,247,0.18); --border-strong:rgba(168,85,247,0.4);
    --text:#F8F8FC; --muted:#9090A8;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}

  /* Loading */
  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--muted)}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple-light);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Topbar */
  .topbar{
    position:sticky;top:0;z-index:50;background:rgba(10,1,24,0.85);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;
  }
  .topbar-brand{display:flex;align-items:center;gap:.7rem;text-decoration:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600}
  .topbar-mark{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0}
  .topbar-actions{display:flex;align-items:center;gap:1rem}
  .topbar-user{font-size:.85rem;color:var(--muted)}
  .btn-logout{background:transparent;border:1px solid var(--border-strong);color:var(--text);padding:.4rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif}
  .btn-logout:hover{background:var(--card-hover)}

  .container{max-width:1300px;margin:0 auto;padding:2rem}
  .empty-state{
    text-align:center;padding:5rem 2rem;background:var(--card);border:1px solid var(--border);border-radius:18px;
    max-width:680px;margin:3rem auto;
  }
  .empty-icon{font-size:4rem;margin-bottom:1.2rem;opacity:.7}
  .empty-state h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin-bottom:.6rem}
  .empty-state p{color:var(--muted);margin-bottom:1.5rem}

  /* Welcome */
  .welcome{
    background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06));
    border:1px solid var(--border-strong);border-radius:18px;
    padding:2rem;margin-bottom:2rem;
    display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
  }
  .welcome-logo{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:1.8rem;flex-shrink:0;overflow:hidden}
  .welcome-logo img{width:100%;height:100%;object-fit:cover}
  .welcome-text{flex:1;min-width:220px}
  .welcome-hi{font-size:.85rem;color:var(--accent,var(--purple-light));font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.3rem}
  .welcome-name{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;line-height:1.1;margin-bottom:.3rem}
  .welcome-meta{color:var(--muted);font-size:.88rem}

  /* Service Selection */
  .services-pick{
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    padding:2rem;margin-bottom:2rem;
  }
  .services-pick h2{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-bottom:.4rem}
  .services-pick p{color:var(--muted);font-size:.9rem;margin-bottom:1.4rem}
  .service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;margin-bottom:1.5rem}
  .service-tile{
    background:var(--bg3);border:2px solid var(--border);border-radius:14px;
    padding:1.2rem;cursor:pointer;transition:all .25s;position:relative;
  }
  .service-tile:hover{border-color:var(--border-strong)}
  .service-tile.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06))}
  .service-tile.selected::after{content:'✓';position:absolute;top:.6rem;right:.7rem;background:var(--purple);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
  .service-tile-icon{font-size:1.6rem;margin-bottom:.6rem}
  .service-tile-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:.2rem}
  .service-tile-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
  .btn-save{
    background:var(--purple);color:#fff;border:none;padding:.85rem 1.6rem;
    border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    box-shadow:0 6px 18px rgba(124,58,237,.3);transition:all .2s;
  }
  .btn-save:hover{background:var(--purple-light);transform:translateY(-1px)}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.6rem}
  .stat-card{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:1.4rem 1.2rem;position:relative;overflow:hidden;
  }
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--magenta))}
  .stat-icon{position:absolute;top:1rem;right:1rem;font-size:1.2rem;opacity:.5}
  .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:.4rem}
  .stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:.3rem;background:linear-gradient(135deg,var(--text),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-sub{font-size:.75rem;color:var(--muted)}
  @media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

  /* Service Section */
  .svc-section{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:1.6rem;margin-bottom:1.4rem;
  }
  .svc-section-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.7rem;margin-bottom:1.2rem}
  .svc-section-head h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
  .svc-status-pill{padding:.2rem .6rem;border-radius:50px;font-size:.7rem;font-weight:600;background:rgba(168,85,247,.15);color:var(--purple-light);text-transform:uppercase;letter-spacing:.05em}

  /* Tables */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:.7rem 1rem;font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);background:var(--bg3)}
  td{padding:.85rem 1rem;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:top}
  .pf-pill{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--purple-light);font-size:.65rem;padding:.18rem .55rem;border-radius:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  .badge{display:inline-block;padding:.18rem .55rem;border-radius:50px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .badge.active{background:rgba(34,216,143,.15);color:var(--green)}
  .badge.paused{background:rgba(234,179,8,.15);color:var(--yellow)}
  .badge.ended{background:rgba(144,144,168,.15);color:var(--muted)}

  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .table-scroll{overflow-x:auto}

  .charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:1rem;margin-bottom:1.6rem}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
  .chart-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .chart-title small{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  canvas{max-width:100%;height:240px !important}
  @media (max-width:900px){.charts-grid{grid-template-columns:1fr}}

  .cta-box{
    background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(236,72,153,.04));
    border:1px solid var(--border-strong);border-radius:14px;
    padding:1.4rem;text-align:center;color:var(--muted);font-size:.9rem;
  }
  .cta-box a{color:var(--purple-light);text-decoration:none;font-weight:600}
  .cta-box a:hover{color:var(--magenta)}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div>Loading your portal&hellip;</div>
</div>

<div id="app" hidden>
  <!-- TOPBAR -->
  <div class="topbar">
    <a href="#" class="topbar-brand">
      <span class="topbar-mark">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="url(#tg)"/><path d="M 40 16 L 64 64 L 54 64 L 50 56 L 30 56 L 26 64 L 16 64 Z M 33.5 48 L 46.5 48 L 40 35 Z" fill="#FFF"/><circle cx="62" cy="20" r="4" fill="#EC4899"/></svg>
      </span>
      Adham<span style="color:var(--magenta)">.</span>&nbsp;Client&nbsp;Portal
    </a>
    <div class="topbar-actions">
      <span class="topbar-user" id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <div class="container" id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const loading = document.getElementById('loading');
const app = document.getElementById('app');
const content = document.getElementById('content');

// Service catalog (must match the service keys saved in clients.services)
const SERVICES = [
  {key:'media_buying', icon:'🎯', name:'Paid Media / Media Buying', desc:'Meta · Google · TikTok ads'},
  {key:'social_media', icon:'📱', name:'Social Media Management', desc:'Content · community · growth'},
  {key:'website_design', icon:'🛒', name:'Website / E-commerce', desc:'Shopify · WordPress · landing pages'},
  {key:'content_creative', icon:'🎨', name:'Content & Creative', desc:'Graphics · video · copy'},
  {key:'crm_automation', icon:'🤖', name:'CRM & Automation', desc:'Zoho · N8N · workflows'},
  {key:'analytics', icon:'📊', name:'Analytics & Reporting', desc:'GA4 · dashboards · insights'},
];

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/signup.html';
});

(async function init(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){ location.href = '/signup.html'; return; }

  document.getElementById('userEmail').textContent = session.user.email;

  // If user is admin, redirect to admin
  const { data: roleRow } = await supabase.from('user_roles').select('role').eq('user_id', session.user.id).single();
  if(roleRow?.role === 'admin'){
    location.href = '/admin.html';
    return;
  }

  // Find linked client record
  const { data: client, error } = await supabase.from('clients').select('*').eq('auth_user_id', session.user.id).maybeSingle();

  loading.hidden = true;
  app.hidden = false;

  if(error || !client){
    renderEmpty(session.user.email);
    return;
  }

  renderPortal(client, session.user);
})();

function renderEmpty(email){
  content.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <h2>Account is being set up</h2>
      <p>Welcome ${email}! Your account exists but isn't linked to a brand profile yet. Adham will link it shortly &mdash; check back in a few minutes, or reach out via WhatsApp.</p>
      <a href="https://wa.me/201044724144" target="_blank" rel="noopener" class="btn-save" style="text-decoration:none;display:inline-block">💬 Message Adham on WhatsApp</a>
    </div>
  `;
}

async function renderPortal(client, user){
  // Fetch related data
  const [{data:campaigns}, {data:metrics}] = await Promise.all([
    supabase.from('client_campaigns').select('*').eq('client_id', client.id).order('created_at',{ascending:false}),
    supabase.from('client_metrics').select('*').eq('client_id', client.id).order('date',{ascending:true})
  ]);

  // Welcome
  let html = `
    <div class="welcome">
      <div class="welcome-logo">${client.logo_url ? `<img src="${esc(client.logo_url)}" alt=""/>` : esc(client.name.charAt(0))}</div>
      <div class="welcome-text">
        <div class="welcome-hi">Welcome back</div>
        <div class="welcome-name">${esc(client.contact_name || client.name)}</div>
        <div class="welcome-meta">${esc(client.name)} · ${esc(client.country || 'Egypt')}</div>
      </div>
    </div>
  `;

  // Service selection (if no service yet)
  const services = client.services || [];
  if(!services.length){
    html += `
      <div class="services-pick">
        <h2>Pick the services you have with us</h2>
        <p>Select all the services you're working with Adham on — your dashboard will show only what's relevant to you.</p>
        <div class="service-grid" id="serviceGrid">
          ${SERVICES.map(s => `
            <div class="service-tile" data-key="${s.key}">
              <div class="service-tile-icon">${s.icon}</div>
              <div class="service-tile-name">${s.name}</div>
              <div class="service-tile-desc">${s.desc}</div>
            </div>
          `).join('')}
        </div>
        <button class="btn-save" id="saveServicesBtn">Save & Open My Dashboard</button>
      </div>
    `;
    content.innerHTML = html;
    wireServiceSelection(client.id);
    return;
  }

  // === Aggregate stats (all services share these) ===
  const sumSpend = (metrics||[]).reduce((s,m) => s + Number(m.spend||0), 0);
  const sumReach = (metrics||[]).reduce((s,m) => s + Number(m.reach||0), 0);
  const sumConv = (metrics||[]).reduce((s,m) => s + Number(m.conversions||0), 0);
  const sumRev = (metrics||[]).reduce((s,m) => s + Number(m.revenue||0), 0);
  const roas = sumSpend > 0 ? (sumRev / sumSpend).toFixed(2) : '—';
  const sumFollowers = (metrics||[]).reduce((s,m) => s + Number(m.followers_gained||0), 0);

  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Total Spend</div><div class="stat-num">$${sumSpend.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="stat-sub">all-time invested</div></div>
    <div class="stat-card"><div class="stat-icon">👁️</div><div class="stat-label">Reach</div><div class="stat-num">${big(sumReach)}</div><div class="stat-sub">unique users</div></div>
    <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-label">Conversions</div><div class="stat-num">${sumConv.toLocaleString()}</div><div class="stat-sub">leads · sales</div></div>
    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-label">ROAS</div><div class="stat-num">${roas === '—' ? '—' : roas+'×'}</div><div class="stat-sub">return on spend</div></div>
  </div>`;

  // Charts
  html += `
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Spend Over Time <small>your investment</small></div>
        <canvas id="chSpend"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">By Platform <small>spend share</small></div>
        <canvas id="chPlatform"></canvas>
      </div>
    </div>
  `;

  // === Service-specific sections ===
  if(services.includes('media_buying')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head">
          <h3>🎯 Media Buying — Active Campaigns</h3>
          <span class="svc-status-pill">${(campaigns||[]).filter(c => c.status==='active').length} active</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Campaign</th><th>Platform</th><th>Objective</th><th>Budget</th><th>Status</th></tr></thead>
            <tbody>
              ${(campaigns||[]).length === 0 ? `<tr><td colspan="5" class="empty">No campaigns running yet — check back soon.</td></tr>` :
                campaigns.map(c => `
                  <tr>
                    <td><strong>${esc(c.name)}</strong></td>
                    <td><span class="pf-pill">${esc(c.platform)}</span></td>
                    <td>${esc(c.objective || '—')}</td>
                    <td>${c.budget ? '$'+Number(c.budget).toLocaleString() : '—'}</td>
                    <td><span class="badge ${c.status}">${c.status}</span></td>
                  </tr>`).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  if(services.includes('social_media')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head"><h3>📱 Social Media</h3></div>
        <div class="stats-grid" style="margin-bottom:0">
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Followers Gained</div><div class="stat-num">${big(sumFollowers)}</div><div class="stat-sub">total growth</div></div>
          <div class="stat-card"><div class="stat-icon">👁️</div><div class="stat-label">Reach</div><div class="stat-num">${big(sumReach)}</div><div class="stat-sub">unique impressions</div></div>
          <div class="stat-card"><div class="stat-icon">📲</div><div class="stat-label">Platforms</div><div class="stat-num">${(client.platforms||[]).length}</div><div class="stat-sub">active channels</div></div>
          <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">Days Active</div><div class="stat-num">${client.start_date ? Math.max(0, Math.floor((Date.now() - new Date(client.start_date).getTime())/(1000*60*60*24))) : '—'}</div><div class="stat-sub">since start</div></div>
        </div>
      </div>
    `;
  }

  if(services.includes('website_design')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head"><h3>🛒 Website / E-commerce</h3></div>
        <div class="cta-box">Live website analytics will appear here once Adham connects your site (GA4 / Shopify). For now, ask him for the latest report on WhatsApp.</div>
      </div>
    `;
  }

  if(services.includes('content_creative')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head"><h3>🎨 Content & Creative</h3></div>
        <div class="cta-box">Content production calendar &amp; deliverables will appear here. New section coming soon.</div>
      </div>
    `;
  }

  if(services.includes('crm_automation')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head"><h3>🤖 CRM &amp; Automation</h3></div>
        <div class="cta-box">CRM pipeline &amp; automation workflows will be visible here. Adham will link them after setup.</div>
      </div>
    `;
  }

  if(services.includes('analytics')){
    html += `
      <div class="svc-section">
        <div class="svc-section-head"><h3>📊 Analytics &amp; Reporting</h3></div>
        <div class="cta-box">Detailed monthly reports + custom dashboards will appear here. Ask Adham for your latest report.</div>
      </div>
    `;
  }

  // CTA to update services
  html += `<div class="cta-box" style="margin-top:1.5rem">Need to add or change a service? <a href="#" id="changeServicesLink">Update your services →</a></div>`;

  content.innerHTML = html;

  // Render charts
  setTimeout(() => renderCharts(metrics || []), 50);

  // Wire change services
  document.getElementById('changeServicesLink')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await supabase.from('clients').update({services:[]}).eq('id', client.id);
    location.reload();
  });
}

function wireServiceSelection(clientId){
  document.querySelectorAll('.service-tile').forEach(t => t.addEventListener('click', () => t.classList.toggle('selected')));
  document.getElementById('saveServicesBtn').addEventListener('click', async (e) => {
    const selected = Array.from(document.querySelectorAll('.service-tile.selected')).map(t => t.dataset.key);
    if(!selected.length){ alert('Please pick at least one service.'); return; }
    e.target.disabled = true; e.target.textContent = 'Saving…';
    const { error } = await supabase.from('clients').update({services: selected}).eq('id', clientId);
    if(error){ alert('Error: '+error.message); e.target.disabled=false; e.target.textContent='Save & Open My Dashboard'; return; }
    location.reload();
  });
}

let chSpend, chPlatform;
function renderCharts(metrics){
  // Spend over time
  const byDate = {};
  metrics.forEach(m => { byDate[m.date] = (byDate[m.date]||0) + Number(m.spend||0); });
  const dates = Object.keys(byDate).sort();
  const spends = dates.map(d => byDate[d]);
  const c1 = document.getElementById('chSpend');
  if(c1){
    if(chSpend) chSpend.destroy();
    const ctx = c1.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,240);
    grad.addColorStop(0,'rgba(168,85,247,0.4)'); grad.addColorStop(1,'rgba(168,85,247,0)');
    chSpend = new Chart(ctx,{
      type:'line',
      data:{labels:dates,datasets:[{label:'Spend',data:spends,borderColor:'#A855F7',backgroundColor:grad,borderWidth:2,tension:0.35,fill:true,pointRadius:3,pointBackgroundColor:'#EC4899'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#5e5e75',font:{size:10}}},y:{grid:{color:'rgba(168,85,247,0.08)'},ticks:{color:'#5e5e75',font:{size:10}}}}}
    });
  }

  // Platform breakdown
  const byPlat = {};
  metrics.forEach(m => { const p = m.platform || 'all'; byPlat[p] = (byPlat[p]||0) + Number(m.spend||0); });
  const c2 = document.getElementById('chPlatform');
  if(c2){
    if(chPlatform) chPlatform.destroy();
    chPlatform = new Chart(c2.getContext('2d'),{
      type:'doughnut',
      data:{labels:Object.keys(byPlat),datasets:[{data:Object.values(byPlat),backgroundColor:['#7C3AED','#A855F7','#EC4899','#06B6D4','#F472B6','#FEF3C7','#22D88F','#EAB308'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9090A8',font:{size:11},padding:12,boxWidth:10}}},cutout:'60%'}
    });
  }
}

function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function big(n){ n=Number(n||0); if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }
</script>
