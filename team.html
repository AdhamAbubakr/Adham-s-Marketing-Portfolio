<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0118" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Team Portal — Barkar.</title>
<link rel="icon" type="image/svg+xml" href="brand/favicon.svg" />
<meta name="robots" content="noindex,nofollow" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#7C3AED; --purple-light:#A855F7; --magenta:#EC4899; --cyan:#06B6D4;
    --bg:#0A0118; --bg2:#11062A; --bg3:#1A0F2E;
    --card:#1C1130; --card-hover:#241540;
    --border:rgba(168,85,247,0.18); --border-strong:rgba(168,85,247,0.4);
    --text:#F8F8FC; --muted:#9090A8; --green:#22D88F; --red:#EF4444; --yellow:#EAB308;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
  ::-webkit-scrollbar{width:14px;height:14px}
  ::-webkit-scrollbar-track{background:var(--bg2);border-left:1px solid var(--border)}
  ::-webkit-scrollbar-thumb{background:linear-gradient(var(--purple),var(--purple-deep));border-radius:8px;border:3px solid var(--bg2);min-height:60px}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(var(--purple-light),var(--purple));border-width:2px}
  ::-webkit-scrollbar-thumb:active{background:var(--purple-light)}
  *{scrollbar-width:auto;scrollbar-color:var(--purple) var(--bg2)}

  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--muted)}
  [hidden]{display:none !important}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple-light);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(10,1,24,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem}
  .topbar-brand{display:flex;align-items:center;gap:.7rem;text-decoration:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600}
  .topbar-mark{width:34px;height:34px;border-radius:9px;overflow:hidden}
  .topbar-actions{display:flex;align-items:center;gap:1rem}
  .topbar-user{font-size:.85rem;color:var(--muted)}
  .btn-logout{background:transparent;border:1px solid var(--border-strong);color:var(--text);padding:.4rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif}
  .btn-logout:hover{background:var(--card-hover)}
  .topbar-back{color:var(--purple-light);text-decoration:none;font-size:.85rem;font-weight:500;padding:.4rem .9rem;border-radius:8px;transition:all .2s}
  .topbar-back:hover{background:var(--card-hover);color:var(--magenta)}
  @media (max-width:600px){.topbar-back{display:none}}

  .container{max-width:1300px;margin:0 auto;padding:2rem}

  .welcome{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06));border:1px solid var(--border-strong);border-radius:18px;padding:2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
  .welcome-avatar{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:1.8rem}
  .welcome-text{flex:1;min-width:220px}
  .welcome-hi{font-size:.85rem;color:var(--purple-light);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.3rem}
  .welcome-name{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;line-height:1.1;margin-bottom:.3rem}
  .welcome-meta{color:var(--muted);font-size:.88rem}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.6rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.2rem;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--magenta))}
  .stat-icon{position:absolute;top:1rem;right:1rem;font-size:1.2rem;opacity:.5}
  .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:.4rem}
  .stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--text),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  @media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

  .section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.4rem}
  .section-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.7rem;margin-bottom:1.2rem}
  .section-head h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600}
  .filter-group{display:flex;gap:.5rem}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .85rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;transition:all .2s}
  .filter-btn:hover{color:var(--text);border-color:var(--border-strong)}
  .filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
  .task-client-filter{background:var(--bg);border:1px solid var(--border-strong);color:var(--text);padding:.4rem .8rem;border-radius:8px;font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer}
  .task-client-filter:focus{outline:none;border-color:var(--purple-light)}

  .task-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:.8rem;cursor:pointer;transition:all .2s}
  .task-card:hover{border-color:var(--border-strong);transform:translateX(4px)}
  .task-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.7rem;margin-bottom:.5rem;flex-wrap:wrap}
  .task-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.98rem;flex:1;min-width:200px}
  .task-meta{display:flex;gap:.5rem;flex-wrap:wrap;font-size:.75rem;color:var(--muted);margin-top:.4rem}
  .task-meta span{display:inline-flex;align-items:center;gap:.25rem}
  .task-priority-low{color:var(--muted)}
  .task-priority-medium{color:var(--cyan)}
  .task-priority-high{color:var(--yellow)}
  .task-priority-urgent{color:var(--red)}
  .task-status-btn{padding:.45rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;transition:all .15s}
  .task-status-btn:hover{border-color:var(--purple-light)}
  .task-status-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}

  .badge{display:inline-block;padding:.18rem .55rem;border-radius:50px;font-size:.7rem;font-weight:600;text-transform:uppercase}
  .badge-todo{background:rgba(144,144,168,0.15);color:var(--muted)}
  .badge-in_progress{background:rgba(168,85,247,0.18);color:var(--purple-light)}
  .badge-review{background:rgba(234,179,8,0.15);color:var(--yellow)}
  .badge-done{background:rgba(34,216,143,0.15);color:var(--green)}
  .badge-blocked{background:rgba(239,68,68,0.15);color:var(--red)}

  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty-icon{font-size:3rem;margin-bottom:.7rem;opacity:.6}

  .empty-state{text-align:center;padding:5rem 2rem;background:var(--card);border:1px solid var(--border);border-radius:18px;max-width:680px;margin:3rem auto}
  .empty-state h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin-bottom:.6rem}
  .empty-state p{color:var(--muted);margin-bottom:1.5rem}

  /* ROLE-SPECIFIC ACTIONS */
  .role-actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
  .role-action-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.1rem;cursor:pointer;transition:all .25s;text-align:center}
  .role-action-card:hover{border-color:var(--border-strong);transform:translateY(-3px);background:var(--card-hover)}
  .role-action-icon{font-size:2rem;margin-bottom:.6rem}
  .role-action-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:.3rem}
  .role-action-desc{font-size:.78rem;color:var(--muted);line-height:1.5}

  /* ============================================================
     RESPONSIVE — Tablet & Mobile
     ============================================================ */
  @media (max-width:760px){
    .topbar{padding:.85rem 1rem;flex-wrap:wrap;gap:.6rem}
    .topbar-logo{width:30px;height:30px}
    .topbar-brand{font-size:.92rem}
    .topbar-pill{font-size:.7rem;padding:.2rem .55rem}
    .topbar-right{gap:.5rem;flex-wrap:wrap}
    .topbar-email{display:none}
    .topbar-back{font-size:.78rem;padding:.4rem .7rem}
    .logout-btn{font-size:.78rem;padding:.4rem .7rem}
    .container{padding:1.2rem 1rem}
    .welcome-h{font-size:clamp(1.4rem,5vw,1.8rem)}
    .stats-grid{gap:.8rem}
    .stat-card{padding:1rem .9rem}
    .stat-num{font-size:1.4rem}
    .stat-label{font-size:.7rem}
    .role-actions{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem}
    .role-action-card{padding:1rem .8rem}
    .role-action-icon{font-size:1.7rem}
    .role-action-label{font-size:.88rem}
    .role-action-desc{font-size:.72rem}
    .filter-bar{flex-wrap:wrap;gap:.4rem}
    .filter-btn{font-size:.78rem;padding:.4rem .7rem}
    .task-card{padding:1rem .9rem}
    .modal{max-width:100% !important;width:100%;max-height:94vh;overflow-y:auto;border-radius:14px}
    .modal-head{padding:1rem 1.1rem;position:sticky;top:0;background:var(--card);z-index:1}
    input, select, textarea{font-size:16px}
  }

  @media (max-width:480px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .stat-card{padding:.85rem .7rem}
    .stat-num{font-size:1.2rem}
    .container{padding:1rem .8rem}
  }

  @media (max-width:380px){
    .stats-grid{grid-template-columns:1fr}
  }

  @media (hover:none) and (pointer:coarse){
    a, button, input, select{-webkit-tap-highlight-color:rgba(124,58,237,.18)}
  }
  @supports (-webkit-touch-callout: none){
    input, select, textarea{font-size:16px !important}
  }
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div>Loading your team portal&hellip;</div>
</div>

<div id="app" hidden>
  <div class="topbar">
    <a href="#" class="topbar-brand">
      <span class="topbar-mark">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="url(#tg)"/><path fill-rule="evenodd" d="M22 16h22c10 0 17 6 17 14 0 5-3 9-7 11 5 2 9 7 9 13 0 8-7 14-17 14H22V16zm10 8v10h12c4 0 6-2 6-5s-2-5-6-5H32zm0 18v12h14c4 0 7-2 7-6s-3-6-7-6H32z" fill="#FFF"/><circle cx="62" cy="20" r="4" fill="#EC4899"/></svg>
      </span>
      Barkar<span style="color:var(--magenta)">.</span>&nbsp;Team&nbsp;Portal
    </a>
    <div class="topbar-actions">
      <a href="/" class="topbar-back">← Back to Site</a>
      <span class="topbar-user" id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <div class="container" id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="ad-accounts.js"></script>
<script src="workflow.js"></script>
<script src="ai-tools.js"></script>

<script>
const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const loading = document.getElementById('loading');
const app = document.getElementById('app');
const content = document.getElementById('content');

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/signup.html';
});

// 10-second safety net — if init takes too long, show error
const safetyTimer = setTimeout(() => {
  if(!loading.hidden){
    console.error('[Team Portal] Timeout — init took >10s');
    loading.hidden = true;
    app.hidden = false;
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⏱️</div><h2>Took too long to load</h2><p>The portal is taking longer than expected. This usually means a network issue.</p><button onclick="location.reload()" style="background:var(--purple);color:#fff;border:none;padding:.85rem 1.6rem;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Try again</button> <button onclick="supabase.auth.signOut().then(()=>location.href='/signup.html')" style="background:transparent;color:var(--muted);border:1px solid var(--border);padding:.7rem 1.4rem;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;margin-left:.6rem">Sign out</button></div>`;
  }
}, 10000);

(async function init(){
  try {
    console.log('[Team Portal] Init start at', new Date().toISOString());
    const { data:{ session }, error: sessionErr } = await supabase.auth.getSession();
    if(sessionErr) console.error('[Team Portal] Session error:', sessionErr);
    if(!session){ console.log('[Team Portal] No session — redirect to signup'); location.href = '/signup.html'; return; }

    document.getElementById('userEmail').textContent = session.user.email;
    console.log('[Team Portal] User:', session.user.email);

    // Use maybeSingle to avoid throwing if no row
    const { data: roleRow, error: roleErr } = await supabase.from('user_roles').select('role').eq('user_id', session.user.id).maybeSingle();
    if(roleErr) console.warn('[Team Portal] Role query error (non-fatal):', roleErr);
    console.log('[Team Portal] Role:', roleRow?.role || 'none');

    if(roleRow?.role === 'admin'){ location.href = '/admin.html'; return; }
    if(roleRow?.role === 'client'){ location.href = '/portal.html'; return; }

    // role = 'team' or null — try to find member record
    const { data: member, error: memberErr } = await supabase.from('team_members').select('*').eq('auth_user_id', session.user.id).maybeSingle();
    if(memberErr) console.warn('[Team Portal] Member query error:', memberErr);
    console.log('[Team Portal] Member:', member);

    loading.hidden = true;
    app.hidden = false;

    if(!member){
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon" style="font-size:4rem">⏳</div>
          <h2>Account being linked</h2>
          <p>Your account isn't linked to a team profile yet. The Barkar team will link it shortly. Reach out via WhatsApp if it's urgent.</p>
          <p style="font-size:.85rem;color:var(--muted);margin-top:1rem">Account: <strong>${session.user.email}</strong></p>
          <a href="https://wa.me/201044724144" target="_blank" rel="noopener" style="background:var(--purple);color:#fff;padding:.85rem 1.6rem;border-radius:10px;font-weight:600;text-decoration:none;display:inline-block;margin-top:1rem">💬 WhatsApp</a>
          <button onclick="supabase.auth.signOut().then(()=>location.href='/signup.html')" style="background:transparent;color:var(--muted);border:1px solid var(--border);padding:.7rem 1.4rem;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;margin-left:.6rem">Sign out</button>
        </div>
      `;
      return;
    }

    clearTimeout(safetyTimer);
    renderPortal(member, session.user);
  } catch(err){
    clearTimeout(safetyTimer);
    console.error('[Team Portal] Fatal error:', err);
    loading.hidden = true;
    app.hidden = false;
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" style="font-size:4rem">⚠️</div>
        <h2>Something went wrong</h2>
        <p>${(err && err.message) || 'Unknown error'}. Open Console (F12) for details.</p>
        <button onclick="location.reload()" style="background:var(--purple);color:#fff;border:none;padding:.85rem 1.6rem;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Reload</button>
        <button onclick="supabase.auth.signOut().then(()=>location.href='/signup.html')" style="background:transparent;color:var(--muted);border:1px solid var(--border);padding:.7rem 1.4rem;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;margin-left:.6rem">Sign out</button>
      </div>
    `;
  }
})();

let allTasksCache = [];

      {icon:'📞', label:'Schedule calls', desc:'Plan client check-ins', action:'calls'},
      {icon:'📈', label:'Monthly reports', desc:'Review & send to clients', action:'reports'},
    ],

async function renderPortal(member, user){
  // Fetch tasks assigned to this user
  const { data: tasks } = await supabase
    .from('tasks')
    .select('*, client:clients(id,name)')
    .eq('assigned_to', user.id)
    .order('due_date', {ascending:true, nullsLast:true})
    .order('created_at', {ascending:false});

  allTasksCache = tasks || [];

  const todo = allTasksCache.filter(t => t.status === 'todo').length;
  const inProgress = allTasksCache.filter(t => t.status === 'in_progress').length;
  const review = allTasksCache.filter(t => t.status === 'review').length;
  const done = allTasksCache.filter(t => t.status === 'done').length;
  const monthAgo = Date.now() - 30*24*60*60*1000;
  const tasksThisMonth = allTasksCache.filter(t => t.completed_at && new Date(t.completed_at).getTime() > monthAgo).length;
  const uniqueClients = new Set(allTasksCache.filter(t => t.client_id).map(t => t.client_id)).size;
  const hoursLogged = allTasksCache.reduce((sum, t) => sum + (Number(t.actual_hours)||0), 0);

  // Role metric data sources
  const metricSources = {
    todo, in_progress: inProgress, review, done,
    tasks_done_month: tasksThisMonth,
    clients_count: uniqueClients,
    hours_logged: hoursLogged.toFixed(1) + 'h',
    avg_hours: done ? (hoursLogged/done).toFixed(1) + 'h' : '—',
    spend_week: '—' // placeholder until ad spend integration
  };

  const initials = (member.full_name || 'M').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  const roleConfig = ROLE_CONFIG[member.role_title] || ROLE_CONFIG.other;

  content.innerHTML = `
    <div class="welcome" style="border-left:4px solid ${roleConfig.color}">
      <div class="welcome-avatar" style="background:linear-gradient(135deg,${roleConfig.color},var(--purple))">${initials}</div>
      <div class="welcome-text">
        <div class="welcome-hi">${roleConfig.icon} ${roleConfig.label}</div>
        <div class="welcome-name">${esc(member.full_name)}</div>
        <div class="welcome-meta">${(member.skills||[]).slice(0,4).join(' · ') || 'No skills set yet'} · <a href="#" id="editProfileLink" style="color:var(--purple-light);text-decoration:none">edit profile</a></div>
      </div>
    </div>

    <!-- Role-specific stats -->
    <div class="stats-grid">
      ${(roleConfig.metrics || []).map(m => `
        <div class="stat-card">
          <div class="stat-icon">${m.icon}</div>
          <div class="stat-label">${m.label}</div>
          <div class="stat-num">${metricSources[m.source] ?? 0}</div>
        </div>
      `).join('')}
    </div>

    ${roleConfig.quickActions?.length ? `
    <div class="section">
      <div class="section-head">
        <h3>${roleConfig.icon} ${roleConfig.label} — Quick Actions</h3>
      </div>
      <div class="role-actions">
        ${roleConfig.quickActions.map(a => `
          <div class="role-action-card" onclick="handleQuickAction('${a.action}', '${esc(a.label)}')">
            <div class="role-action-icon">${a.icon}</div>
            <div class="role-action-label">${a.label}</div>
            <div class="role-action-desc">${a.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <!-- AI Toolkit — tools picked for this role -->
    <div class="section">
      <div class="section-head">
        <h3>🤖 AI Toolkit</h3>
      </div>
      <div id="teamAIToolkitContainer"></div>
    </div>

    <!-- Knowledge Base — role playbook + reference files -->
    <div class="section">
      <div class="section-head">
        <h3>📚 Knowledge Base</h3>
      </div>
      <div id="teamKBContainer"></div>
    </div>

    <!-- Workflow Inbox (work handed to my role from the previous cycle stage) -->
    <div class="section">
      <div class="section-head">
        <h3>🔄 Workflow</h3>
      </div>
      <div id="teamWorkflowContainer"></div>
    </div>

    <!-- Ad Accounts (visible if assigned — RLS handles filtering) -->
    <div class="section">
      <div class="section-head">
        <h3>📈 My Ad Accounts</h3>
      </div>
      <div id="teamAdAccountsContainer"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h3>📋 My Tasks</h3>
        <div class="filter-group">
          <select id="taskClientFilter" class="task-client-filter">
            <option value="">All clients</option>
            ${[...new Map(allTasksCache.filter(t => t.client).map(t => [t.client.id, t.client])).values()]
              .map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')}
          </select>
          <button class="filter-btn active" data-filter="all" onclick="filterTasks('all', this)">All</button>
          <button class="filter-btn" data-filter="todo" onclick="filterTasks('todo', this)">To Do</button>
          <button class="filter-btn" data-filter="in_progress" onclick="filterTasks('in_progress', this)">In Progress</button>

    <div id="profileEditCard" class="section" style="display:none">

      <form id="profileForm">

          <div><label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">Full Name</label><input type="text" id="pf_name" value="${esc(member.full_name)}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/></div>
          <div><label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">Phone</label><input type="tel" id="pf_phone" value="${esc(member.phone||'')}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/></div>
        </div>
        <div style="margin-bottom:.8rem">
          <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">Country</label>
          <input type="text" id="pf_country" value="${esc(member.country||'')}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/>
        </div>
        <div style="margin-bottom:.8rem">
          <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">Skills (comma-separated)</label>
          <input type="text" id="pf_skills" value="${esc((member.skills||[]).join(', '))}" placeholder="Photoshop, Illustrator, Figma" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem">
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">📂 Portfolio URL</label>
            <input type="url" id="pf_portfolio" value="${esc(member.portfolio_url||'')}" placeholder="https://behance.net/yourname" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/>
          </div>
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">🖼️ Avatar URL (optional)</label>
            <input type="url" id="pf_avatar" value="${esc(member.avatar_url||'')}" placeholder="https://..." style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif"/>
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem">Bio / About</label>
          <textarea id="pf_notes" rows="3" placeholder="Tell us about yourself, your style, your achievements…" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:9px;font-family:'Inter',sans-serif;resize:vertical">${esc(member.notes||'')}</textarea>
        </div>
        <button type="submit" style="background:var(--purple);color:#fff;border:none;padding:.8rem 1.4rem;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">💾 Save Profile</button>
      </form>
    </div>
  `;

  // Wire profile edit
  document.getElementById('editProfileLink').addEventListener('click', (e) => {
    e.preventDefault();
    const c = document.getElementById('profileEditCard');
    c.style.display = c.style.display === 'none' ? '' : 'none';
    if(c.style.display !== 'none') c.scrollIntoView({behavior:'smooth'});
  });

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const skills = document.getElementById('pf_skills').value.split(',').map(s => s.trim()).filter(Boolean);
    const updates = {
      full_name: document.getElementById('pf_name').value.trim(),
      phone: document.getElementById('pf_phone').value.trim() || null,
      country: document.getElementById('pf_country').value.trim() || null,
      skills,
      notes: document.getElementById('pf_notes').value.trim() || null,
      portfolio_url: document.getElementById('pf_portfolio').value.trim() || null,
      avatar_url: document.getElementById('pf_avatar').value.trim() || null,
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('team_members').update(updates).eq('id', member.id);
    if(error){ alert('Error: '+error.message); return; }
    alert('✅ Profile updated!');
    location.reload();
  });

  renderTasks();

  // Render AI Toolkit for this member's role
  if(window.AITools){
    window.AITools.renderToolkit({
      container: 'teamAIToolkitContainer',
      supabase,
      role: member.role_title || 'other'
    });
  }

  // Render Knowledge Base (role playbook + reference files)
  if(window.KnowledgeBase){
    window.KnowledgeBase.renderKB({
      container: 'teamKBContainer',
      supabase,
      role: member.role_title || 'other'
    });
  }

  // Render Workflow Inbox (handoffs to my role)
  if(window.Workflow){
    window.Workflow.renderTeamWorkflow({
      container: 'teamWorkflowContainer',
      supabase,
      member
    });
  }

  // Render Ad Accounts (will show empty state if none assigned)
  if(window.AdAccounts){
    window.AdAccounts.renderTeamView({
      container: 'teamAdAccountsContainer',
      supabase,
      currentTeamId: member.id
    });
  }
}

let currentClientFilter = '';

window.filterTasks = (status, btn) => {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderTasks();
};

// Wire client dropdown after render
function wireClientFilter(){
  const sel = document.getElementById('taskClientFilter');
  if(!sel) return;
  sel.value = currentClientFilter;
  sel.onchange = () => { currentClientFilter = sel.value; renderTasks(); };
}

function renderTasks(){
  const wrap = document.getElementById('tasksList');
  let filtered = allTasksCache;
  if(currentFilter !== 'all') filtered = filtered.filter(t => t.status === currentFilter);
  if(currentClientFilter) filtered = filtered.filter(t => t.client_id === currentClientFilter);
  if(!filtered.length){
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div>No tasks match these filters. Try changing them!</div>`;
    wireClientFilter();
    return;
  }
  const PRIORITY_ICON = {low:'⬇️',medium:'➡️',high:'⬆️',urgent:'🔥'};
  wrap.innerHTML = filtered.map(t => `
    <div class="task-card">
      <div class="task-card-head">
        <div class="task-title">${esc(t.title)}</div>
        <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
      </div>
      ${t.description ? `<div style="color:var(--muted);font-size:.88rem;margin-bottom:.7rem">${esc(t.description)}</div>` : ''}
      <div class="task-meta">
        <span>${esc(t.type)}</span>
        ${t.client ? `<span>· 🏢 ${esc(t.client.name)}</span>` : ''}
        <span class="task-priority-${t.priority}">· ${PRIORITY_ICON[t.priority]||''} ${t.priority}</span>
        ${t.due_date ? `<span>· 📅 ${t.due_date}</span>` : ''}
        ${t.estimated_hours ? `<span>· ⏱️ ${t.estimated_hours}h</span>` : ''}
      </div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.9rem">
        ${['todo','in_progress','review','done','blocked'].map(s => `
          <button class="task-status-btn ${t.status === s ? 'active' : ''}" onclick="updateTaskStatus('${t.id}','${s}')">${s.replace('_',' ')}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
  wireClientFilter();
}

window.updateTaskStatus = async (id, status) => {
  const updates = { status, updated_at: new Date().toISOString() };
  if(status === 'in_progress' && !allTasksCache.find(t => t.id === id)?.started_at){
    updates.started_at = new Date().toISOString();
  }
  if(status === 'done'){
    updates.completed_at = new Date().toISOString();
  }
  await supabase.from('tasks').update(updates).eq('id', id);
  // Update cache
  const t = allTasksCache.find(x => x.id === id);
  if(t) Object.assign(t, updates);
  renderTasks();
};

function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
