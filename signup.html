<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Sign Up — Barkar.</title>
<link rel="icon" type="image/svg+xml" href="brand/favicon.svg" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#7C3AED; --purple-light:#A855F7; --magenta:#EC4899; --cyan:#06B6D4;
    --bg:#0A0118; --bg2:#11062A; --bg3:#1A0F2E;
    --card:#1C1130;
    --border:rgba(168,85,247,0.18); --border-strong:rgba(168,85,247,0.4);
    --text:#F8F8FC; --muted:#9090A8; --green:#22D88F; --red:#EF4444;
  }
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
    background-image:radial-gradient(ellipse 60% 50% at 70% 30%,rgba(124,58,237,0.18),transparent 70%),
                     radial-gradient(ellipse 50% 50% at 20% 80%,rgba(236,72,153,0.10),transparent 65%);
  }
  .wrap{width:100%;max-width:520px}
  .head{text-align:center;margin-bottom:2rem}
  .mark{width:64px;height:64px;border-radius:14px;margin:0 auto 1.4rem;display:block;overflow:hidden;box-shadow:0 12px 32px rgba(124,58,237,.4)}
  h1{font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;margin-bottom:.4rem;letter-spacing:-.01em}
  h1 .dot{color:var(--magenta)}
  .head .sub{color:var(--muted);font-size:.95rem}

  .card{
    background:var(--card);border:1px solid var(--border-strong);border-radius:18px;
    padding:2.2rem;box-shadow:0 30px 80px rgba(0,0,0,.4);
  }

  /* Tabs */
  .auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:.3rem;margin-bottom:1.6rem;gap:.3rem}
  .auth-tab{
    flex:1;padding:.6rem;text-align:center;background:transparent;border:none;
    color:var(--muted);font-weight:600;font-size:.88rem;cursor:pointer;border-radius:8px;
    transition:all .2s;font-family:'Inter',sans-serif;
  }
  .auth-tab.active{background:var(--purple);color:#fff}

  label{display:block;font-size:.78rem;font-weight:600;margin-bottom:.4rem;letter-spacing:.02em}
  input,select{
    width:100%;background:var(--bg);border:1px solid var(--border);
    color:var(--text);padding:.8rem 1rem;border-radius:10px;
    font-family:'Inter',sans-serif;font-size:.95rem;margin-bottom:1rem;
    transition:border-color .2s, box-shadow .2s;
  }
  input:focus,select:focus{outline:none;border-color:var(--purple-light);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
  @media (max-width:480px){.row{grid-template-columns:1fr}}

  button[type="submit"]{
    width:100%;background:var(--purple);color:#fff;border:none;padding:.95rem;
    border-radius:10px;font-weight:600;font-size:.95rem;cursor:pointer;
    transition:all .2s;font-family:'Inter',sans-serif;margin-top:.5rem;
    box-shadow:0 6px 20px rgba(124,58,237,.35);
  }
  button[type="submit"]:hover{background:var(--purple-light);transform:translateY(-1px)}
  button[type="submit"]:disabled{opacity:.6;cursor:not-allowed}

  .feedback{padding:.8rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
  .feedback.show{display:block}
  .feedback.success{background:rgba(34,216,143,.1);border:1px solid rgba(34,216,143,.4);color:var(--green)}
  .feedback.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--red)}

  .switch-link{text-align:center;margin-top:1.4rem;color:var(--muted);font-size:.85rem}
  .switch-link a{color:var(--purple-light);text-decoration:none;font-weight:600}
  .switch-link a:hover{color:var(--magenta)}
  .footer-link{text-align:center;margin-top:1.5rem;font-size:.8rem;color:var(--muted)}
  .footer-link a{color:var(--purple-light);text-decoration:none}

  /* PASSWORD HINT */
  .pw-hint{font-size:.78rem;padding:.4rem .8rem;border-radius:8px;margin:-.6rem 0 .8rem}
  .pw-hint.match{background:rgba(34,216,143,.12);color:var(--green);border:1px solid rgba(34,216,143,.3)}
  .pw-hint.nomatch{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3)}

  /* TYPE PICKER */
  .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.4rem}
  @media (max-width:480px){.type-grid{grid-template-columns:1fr}}
  .type-card{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:1.4rem 1rem;cursor:pointer;transition:all .25s;color:var(--text);font-family:'Inter',sans-serif;text-align:center}
  .type-card:hover{border-color:var(--purple-light);background:var(--bg3)}
  .type-card.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.06))}
  .type-icon{font-size:2.4rem;margin-bottom:.6rem}
  .type-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;margin-bottom:.3rem}
  .type-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="mark">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A855F7"/>
          </linearGradient>
        </defs>
        <rect width="80" height="80" rx="18" fill="url(#g1)"/>
        <path fill-rule="evenodd" d="M22 16h22c10 0 17 6 17 14 0 5-3 9-7 11 5 2 9 7 9 13 0 8-7 14-17 14H22V16zm10 8v10h12c4 0 6-2 6-5s-2-5-6-5H32zm0 18v12h14c4 0 7-2 7-6s-3-6-7-6H32z" fill="#FFF"/>
        <circle cx="62" cy="20" r="4" fill="#EC4899"/>
      </svg>
    </div>
    <h1>Welcome to Barkar<span class="dot">.</span></h1>
    <p class="sub">Where brands grow and teams build &mdash; sign in to your space.</p>
  </div>

  <div class="card">
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="signup">Sign Up</button>
      <button class="auth-tab" data-mode="login">Sign In</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <!-- STEP 1: TYPE PICKER (signup only) -->
    <div id="typePickerStep">
      <p style="color:var(--muted);font-size:.92rem;margin-bottom:1rem;text-align:center">I'm joining as&hellip;</p>
      <div class="type-grid">
        <button type="button" class="type-card" data-type="client">
          <div class="type-icon">🏢</div>
          <div class="type-label">A Client</div>
          <div class="type-desc">I want marketing services for my brand</div>
        </button>
        <button type="button" class="type-card" data-type="team">
          <div class="type-icon">👨‍💻</div>
          <div class="type-label">Team Member</div>
          <div class="type-desc">I'm a designer, editor, marketer, or specialist</div>
        </button>
      </div>
    </div>

    <!-- STEP 2A: CLIENT SIGNUP FORM -->
    <form id="signupForm" style="display:none">
      <input type="hidden" id="signup_type" value="client" />
      <a href="#" id="backToTypePicker" class="back-link" style="display:inline-flex;align-items:center;gap:.4rem;color:var(--purple-light);text-decoration:none;font-size:.85rem;margin-bottom:.8rem">← Change account type</a>

      <!-- Client fields -->
      <div id="clientFields">
        <div class="row">
          <div>
            <label>Full Name *</label>
            <input type="text" id="su_name" required placeholder="John Doe" />
          </div>
          <div>
            <label>Brand / Company *</label>
            <input type="text" id="su_brand" required placeholder="Acme Inc." />
          </div>
        </div>
        <label>Email *</label>
        <input type="email" id="su_email" required autocomplete="email" placeholder="you@company.com" />
        <div class="row">
          <div>
            <label>Password *</label>
            <input type="password" id="su_password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
          </div>
          <div>
            <label>Confirm Password *</label>
            <input type="password" id="su_password2" required minlength="6" autocomplete="new-password" placeholder="Type password again" />
          </div>
        </div>
        <div class="pw-hint" id="pwHintClient" style="display:none"></div>
        <div class="row">
          <div>
            <label>Phone / WhatsApp</label>
            <input type="tel" id="su_phone" placeholder="+20 100 000 0000" />
          </div>
          <div>
            <label>Country</label>
            <input type="text" id="su_country" placeholder="Egypt" />
          </div>
        </div>
      </div>

      <!-- Team fields (hidden by default) -->
      <div id="teamFields" style="display:none">
        <label>Full Name *</label>
        <input type="text" id="su_team_name" placeholder="Sara Ahmed" />
        <label>Role / Job Title *</label>
        <select id="su_team_role">
          <option value="">Choose your role…</option>
          <option value="designer">🎨 Graphic Designer</option>
          <option value="video_editor">🎬 Video Editor</option>
          <option value="content_creator">📝 Content Creator</option>
          <option value="copywriter">✍️ Copywriter</option>
          <option value="social_media_specialist">📱 Social Media Specialist</option>
          <option value="media_buyer">🎯 Media Buyer (Ads)</option>
          <option value="account_manager">💼 Account Manager</option>
          <option value="seo_specialist">🔍 SEO Specialist</option>
          <option value="web_developer">💻 Web Developer</option>
          <option value="shopify_designer">🛒 Shopify Designer</option>
          <option value="wordpress_designer">🌐 WordPress Designer</option>
          <option value="photographer">📸 Photographer</option>
          <option value="strategist">🧠 Strategist</option>
          <option value="other">🌟 Other</option>
        </select>
        <label>Email *</label>
        <input type="email" id="su_team_email" autocomplete="email" placeholder="you@email.com" />
        <div class="row">
          <div>
            <label>Password *</label>
            <input type="password" id="su_team_password" minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
          </div>
          <div>
            <label>Confirm Password *</label>
            <input type="password" id="su_team_password2" minlength="6" autocomplete="new-password" placeholder="Type password again" />
          </div>
        </div>
        <div class="pw-hint" id="pwHintTeam" style="display:none"></div>
        <div class="row">
          <div>
            <label>Phone</label>
            <input type="tel" id="su_team_phone" placeholder="+20 100 000 0000" />
          </div>
          <div>
            <label>Country</label>
            <input type="text" id="su_team_country" placeholder="Egypt" />
          </div>
        </div>
        <label>Skills (comma-separated)</label>
        <input type="text" id="su_team_skills" placeholder="Photoshop, Illustrator, Figma" />
        <p style="font-size:.78rem;color:var(--muted);margin-top:.4rem">After signup, you'll be able to upload your portfolio and complete your profile.</p>
      </div>

      <button type="submit" id="signupBtn">Create My Account →</button>
    </form>

    <!-- LOGIN FORM -->
    <form id="loginForm" style="display:none">
      <label>Email</label>
      <input type="email" id="li_email" required autocomplete="email" />
      <label>Password</label>
      <input type="password" id="li_password" required autocomplete="current-password" />
      <button type="submit" id="loginBtn">Sign In →</button>
    </form>

    <div class="switch-link" id="switchLinkWrap">
      <span id="switchText">Already have an account? <a href="#" onclick="setMode('login');return false">Sign in</a></span>
    </div>
  </div>

  <div class="footer-link">
    <a href="/">← Back to portfolio</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const fb = document.getElementById('feedback');
const signupForm = document.getElementById('signupForm');
const loginForm = document.getElementById('loginForm');

function show(msg, type){
  fb.className = `feedback show ${type}`;
  fb.textContent = msg;
  fb.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function clearFb(){ fb.className = 'feedback'; fb.textContent = ''; }

const typePicker = document.getElementById('typePickerStep');

function setMode(mode){
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  if(mode === 'signup'){
    // Show type picker first; signupForm stays hidden until type picked
    typePicker.style.display = '';
    signupForm.style.display = 'none';
    loginForm.style.display = 'none';
  } else {
    typePicker.style.display = 'none';
    signupForm.style.display = 'none';
    loginForm.style.display = '';
  }
  document.getElementById('switchText').innerHTML = mode === 'signup'
    ? `Already have an account? <a href="#" onclick="setMode('login');return false">Sign in</a>`
    : `New here? <a href="#" onclick="setMode('signup');return false">Create an account</a>`;
  clearFb();
}
window.setMode = setMode;
document.querySelectorAll('.auth-tab').forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));

// Type picker
const CLIENT_REQUIRED = ['su_name','su_brand','su_email','su_password','su_password2'];
const TEAM_REQUIRED   = ['su_team_name','su_team_role','su_team_email','su_team_password','su_team_password2'];

document.querySelectorAll('.type-card').forEach(card => {
  card.addEventListener('click', () => {
    const type = card.dataset.type;
    document.getElementById('signup_type').value = type;
    typePicker.style.display = 'none';
    signupForm.style.display = '';
    if(type === 'client'){
      document.getElementById('clientFields').style.display = '';
      document.getElementById('teamFields').style.display = 'none';
      CLIENT_REQUIRED.forEach(id => document.getElementById(id).required = true);
      TEAM_REQUIRED.forEach(id => document.getElementById(id).required = false);
    } else {
      document.getElementById('clientFields').style.display = 'none';
      document.getElementById('teamFields').style.display = '';
      CLIENT_REQUIRED.forEach(id => document.getElementById(id).required = false);
      TEAM_REQUIRED.forEach(id => document.getElementById(id).required = true);
    }
  });
});

document.getElementById('backToTypePicker').addEventListener('click', (e) => {
  e.preventDefault();
  signupForm.style.display = 'none';
  typePicker.style.display = '';
  clearFb();
});

// Live password match check
function setupPasswordMatch(p1Id, p2Id, hintId){
  const p1 = document.getElementById(p1Id);
  const p2 = document.getElementById(p2Id);
  const hint = document.getElementById(hintId);
  function check(){
    if(!p2.value){ hint.style.display = 'none'; return; }
    if(p1.value === p2.value){
      hint.className = 'pw-hint match';
      hint.textContent = '✅ Passwords match';
      hint.style.display = '';
    } else {
      hint.className = 'pw-hint nomatch';
      hint.textContent = '⚠️ Passwords do not match yet';
      hint.style.display = '';
    }
  }
  p1.addEventListener('input', check);
  p2.addEventListener('input', check);
}
setupPasswordMatch('su_password', 'su_password2', 'pwHintClient');
setupPasswordMatch('su_team_password', 'su_team_password2', 'pwHintTeam');

// SIGNUP — handles both client and team
signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearFb();
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const type = document.getElementById('signup_type').value;

  if(type === 'team'){
    // ===== TEAM MEMBER SIGNUP =====
    const email = document.getElementById('su_team_email').value.trim();
    const password = document.getElementById('su_team_password').value;
    const password2 = document.getElementById('su_team_password2').value;
    if(password !== password2){
      show('⚠️ Passwords do not match. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create My Account →';
      return;
    }
    if(password.length < 6){
      show('⚠️ Password must be at least 6 characters.', 'error');
      btn.disabled = false; btn.textContent = 'Create My Account →';
      return;
    }
    const fullName = document.getElementById('su_team_name').value.trim();
    const roleTitle = document.getElementById('su_team_role').value;
    const phone = document.getElementById('su_team_phone').value.trim();
    const country = document.getElementById('su_team_country').value.trim();
    const skillsRaw = document.getElementById('su_team_skills').value.trim();
    const skills = skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: fullName, role_title: roleTitle, account_type: 'team' } }
    });
    if(error){ show('⚠️ ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Create My Account →'; return; }

    if(data.user){
      // Set role to 'team' — fails silently if SQL Phase 4-8 not run yet
      const { error: roleErr } = await supabase.from('user_roles').upsert({ user_id: data.user.id, role: 'team' }, { onConflict:'user_id' });
      if(roleErr){
        console.warn('Role set failed (run phase4-8-schema.sql in Supabase to enable team role):', roleErr.message);
      }

      // Create team_members record — requires phase4-8-schema.sql to be run
      const { error: tmErr } = await supabase.from('team_members').insert([{
        auth_user_id: data.user.id,
        full_name: fullName,
        role_title: roleTitle,
        email,
        phone: phone || null,
        country: country || null,
        skills,
        status: 'active'
      }]);
      if(tmErr){
        show('⚠️ Account created, but team profile could not be saved. Admin needs to run the latest SQL schema. Error: ' + tmErr.message, 'error');
        btn.disabled = false; btn.textContent = 'Create My Account →';
        return;
      }
    }

    show('✅ Team account created! ' + (data.session ? 'Redirecting…' : 'Check your email to verify, then sign in.'), 'success');
    if(data.session) setTimeout(() => location.href = '/team.html', 1200);
    else setTimeout(() => setMode('login'), 1800);
    btn.disabled = false; btn.textContent = 'Create My Account →';
    return;
  }

  // ===== CLIENT SIGNUP =====
  const email = document.getElementById('su_email').value.trim();
  const password = document.getElementById('su_password').value;
  const password2 = document.getElementById('su_password2').value;
  if(password !== password2){
    show('⚠️ Passwords do not match. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Create My Account →';
    return;
  }
  if(password.length < 6){
    show('⚠️ Password must be at least 6 characters.', 'error');
    btn.disabled = false; btn.textContent = 'Create My Account →';
    return;
  }
  const fullName = document.getElementById('su_name').value.trim();
  const brand = document.getElementById('su_brand').value.trim();
  const phone = document.getElementById('su_phone').value.trim();
  const country = document.getElementById('su_country').value.trim();

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: fullName, brand, phone, country, account_type: 'client' } }
  });
  if(error){ show('⚠️ ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Create My Account →'; return; }

  if(data.user){
    const { data: existing } = await supabase.from('clients')
      .select('id,auth_user_id')
      .eq('contact_email', email)
      .is('auth_user_id', null)
      .limit(1);

    if(existing && existing.length){
      await supabase.from('clients').update({
        auth_user_id: data.user.id,
        contact_name: fullName,
        contact_phone: phone || undefined,
      }).eq('id', existing[0].id);
    } else {
      const slug = brand.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Date.now().toString(36);
      await supabase.from('clients').insert([{
        name: brand, slug,
        country: country || null,
        contact_name: fullName,
        contact_email: email,
        contact_phone: phone || null,
        auth_user_id: data.user.id,
        status: 'active', services: [], platforms: []
      }]);
    }
  }

  show('✅ Account created! ' + (data.session ? 'Redirecting…' : 'Check your email to verify, then sign in.'), 'success');
  if(data.session) setTimeout(() => location.href = '/portal.html', 1200);
  else setTimeout(() => setMode('login'), 1800);
  btn.disabled = false; btn.textContent = 'Create My Account →';
});

// LOGIN
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearFb();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const email = document.getElementById('li_email').value.trim();
  const password = document.getElementById('li_password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){
    show('⚠️ ' + error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In →';
    return;
  }

  // Check role and redirect appropriately
  const { data: roleRow } = await supabase.from('user_roles').select('role').eq('user_id', data.user.id).single();
  const role = roleRow?.role || 'client';
  const target = role === 'admin' ? '/admin.html' : role === 'team' ? '/team.html' : '/portal.html';

  show('✅ Signed in! Redirecting…', 'success');
  setTimeout(() => location.href = target, 600);
});

// Already logged in? Skip the page.
(async () => {
  const { data:{ session } } = await supabase.auth.getSession();
  if(session){
    const { data: roleRow } = await supabase.from('user_roles').select('role').eq('user_id', session.user.id).single();
    const role = roleRow?.role || 'client';
    location.href = role === 'admin' ? '/admin.html' : role === 'team' ? '/team.html' : '/portal.html';
  }
})();
</script>
</body>
</html>
